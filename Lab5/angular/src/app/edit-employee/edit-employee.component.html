<div>
  <h2>Edit Employee</h2>
  <form (ngSubmit)="updateEmployee()">
    <div>
      <label for="employeeName">Employee Name:</label>
      <input
        id="employeeName"
        [(ngModel)]="employeeName"
        name="employeeName"
        type="text"
        required
      />
    </div>
    <div>
      <label for="employeeLevel">Employee Level:</label>
      <input
        id="employeeLevel"
        [(ngModel)]="employeeLevel"
        name="employeeLevel"
        type="text"
        required
      />
    </div>
    <button type="submit">Update Employee</button>
  </form>

  <a routerLink="/companies/{{ companyId }}">Back to Employees</a>
</div>
